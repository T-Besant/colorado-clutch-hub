<section class="panel">
  <h2>Badges <span class="badgecount">{{ badges | selectattr('earned') | list | length }} / {{ badges|length }}</span></h2>
  <div class="badges">
    {% for b in badges %}
      <div class="badge-item {{ 'earned' if b.earned else 'locked' }}">
        <span class="badge-emoji">{{ b.emoji }}</span>
        <span class="badge-name">{{ b.name }}</span>
        <span class="badge-desc">{{ b.desc }}</span>
      </div>
    {% endfor %}
  </div>
</section>
